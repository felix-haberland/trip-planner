# Nixpacks build config for Railway (and any other nixpacks-based host).
# https://nixpacks.com/docs/configuration/file

[phases.setup]
nixPkgs = ["python312"]

[phases.install]
cmds = ["python -m venv /opt/venv && . /opt/venv/bin/activate && pip install --no-cache-dir -r backend/requirements.txt"]

[start]
cmd = ". /opt/venv/bin/activate && cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
